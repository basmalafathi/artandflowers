<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Art & Flowers</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- استدعاء خط كايرو بشكل صحيح ليعمل على كل الأجهزة -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background: #ede2ec99;
        }

        .my-header {
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand-logo {
            color: #ab7880;
            font-size: 30px;
            font-weight: bold;
        }

        .navigation-links a {
            text-decoration: none;
            color: #333;
            margin: 0 15px;
            font-weight: 600;
        }

        .active-link {
            background: #fdebee;
            color: #c99aa1 !important;
            padding: 5px 15px;
            border-radius: 5px;
        }

        .profile-icon {
            color: #e7a9b2;
            font-size: 35px;
        }

        .main-banner {
            min-height: 550px;
            height: 70vh;
            /* يعتمد على ارتفاع الشاشة المتوفرة */
            background: url('flower.jpg') center/cover no-repeat;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding-right: 50px;
            color: #f3d6e0;
        }

        .main-banner h1 {
            font-size: 45px;
            text-shadow: 1px 1px 5px rgba(0, 0, 0, 0.3);
        }

        .main-banner h2 {
            font-size: 55px;
            margin: 10px 0;
            max-width: 400px;
            /* تم التعديل من width إلى max-width حتى لا تخرج عن الشاشة */
            width: 100%;
            padding-bottom: 20px;
            border-bottom: 4px solid #925e65;
            text-shadow: 1px 1px 5px rgba(0, 0, 0, 0.3);
        }

        .main-banner p {
            font-size: 35px;
            text-shadow: 1px 1px 5px rgba(0, 0, 0, 0.3);
        }

        .cards-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
            display: flex;
            justify-content: center;
            gap: 25px;
            flex-wrap: wrap;
        }

        .card-link {
            text-decoration: none;
            color: inherit;
            width: 30%;
            min-width: 250px;
        }

        .single-card {
            background: #fff;
            border: 1px solid #f8f5f4;
            border-radius: 15px;
            padding: 30px 10px;
            text-align: center;
            transition: .3s;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.02);
        }

        .single-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.06);
        }

        .icon-circle {
            width: 50px;
            height: 50px;
            margin: 0 auto 15px;
            border-radius: 50%;
            background: #875e66dd;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }

        .single-card h3 {
            margin-bottom: 5px;
            color: #444;
        }

        .single-card p {
            color: #777;
            font-size: 14px;
        }

        /* تعديلات الجوال (شاشات أصغر من 768 بكسل) */
        @media (max-width: 768px) {

            /* تنسيق الهيدر للجوال   */
            .my-header {
                padding: 15px 20px;
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }

            .navigation-links {
                display: flex;
                justify-content: center;
                gap: 5px;
                width: 100%;
            }

            .navigation-links a {
                margin: 0 5px;
                font-size: 14px;
                padding: 5px 10px;
            }

            /* تنسيق البانر للجوال وتقليص الخطوط  */
            .main-banner {
                height: auto;
                min-height: 350px;
                padding: 40px 20px;
                align-items: center;
                text-align: center;
            }

            .main-banner h1 {
                font-size: 26px;
            }

            .main-banner h2 {
                font-size: 36px;
                max-width: 100%;
                padding-bottom: 10px;
                margin: 5px 0;
            }

            .main-banner p {
                font-size: 20px;
            }

            /* تنسيق الكروت لتأخذ العرض الكامل بشكل مرتب */
            .cards-container {
                margin: 20px auto;
                gap: 15px;
                padding: 0 15px;
            }

            .card-link {
                width: 100%;
                /* تجعل الكروت تترتب تحت بعضها   */
            }

            .single-card {
                padding: 20px 10px;
            }
        }
    </style>
</head>

<body>

    <header class="my-header">
        <div class="brand-logo">Art & Flowers</div>

        <nav class="navigation-links">
            <a href="index.html" class="active-link">الرئيسية</a>
            <a href="view.html">عرض الباقات</a>
            <a href="about.html">نبذة عنا</a>
        </nav>

        <div class="profile-icon">
            <i class="fa-regular fa-user"></i>
        </div>
    </header>

    <section class="main-banner">
        <h1>مرحبًا بك في</h1>
        <h2>Art & Flowers</h2>
        <p>أجمل الباقات لتناسب كل مناسبة</p>
    </section>

    <section class="cards-container">

        <a href="view.html" class="card-link">
            <div class="single-card">
                <div class="icon-circle">
                    <i class="fa-solid fa-seedling"></i>
                </div>
                <h3>عرض الباقات</h3>
                <p>عرض جميع الباقات</p>
            </div>
        </a>

        <a href="add.html" class="card-link">
            <div class="single-card">
                <div class="icon-circle">
                    <i class="fa-solid fa-spa"></i>
                </div>
                <h3>إضافة باقة</h3>
                <p>إضافة باقة زهور جديدة</p>
            </div>
        </a>

        <a href="about.html" class="card-link">
            <div class="single-card">
                <div class="icon-circle">
                    <i class="fa-solid fa-circle-info"></i>
                </div>
                <h3>نبذة عنا</h3>
                <p>التعرف على متجر Art & Flowers</p>
            </div>
        </a>

    </section>

</body>

</html>

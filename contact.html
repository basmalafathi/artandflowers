<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تواصل معنا | Art & Flowers</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #fdf7f8, #f8f4f2);
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 1200px;
            margin: auto;
            padding: 40px 0;
        }

        .back-btn {
            display: inline-block;
            text-decoration: none;
            background: #c98a93;
            color: white;
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 18px;
            transition: .3s;
        }

        .back-btn:hover {
            background: #b8747e;
        }

        .title {
            text-align: center;
            margin: 40px 0;
        }

        .title h1 {
            font-size: 55px;
            color: #c98a93;
        }

        .title p {
            color: #666;
            font-size: 20px;
        }

        .contact-box {
            background: white;
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            max-width: 800px;
            margin: auto;
        }

        .info {
            margin-bottom: 30px;
        }

        .info h3 {
            color: #c98a93;
            margin-bottom: 10px;
        }

        .info p {
            font-size: 20px;
            color: #555;
            margin-bottom: 10px;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        input,
        textarea {
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 17px;
        }

        textarea {
            resize: none;
            height: 150px;
        }

        button {
            background: #c98a93;
            color: white;
            border: none;
            padding: 15px;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
            transition: .3s;
        }

        button:hover {
            background: #b8747e;
        }

        .footer-text {
            text-align: center;
            margin-top: 25px;
            color: #777;
            font-size: 18px;
        }

        @media(max-width:768px) {
            .title h1 {
                font-size: 40px;
            }

            .contact-box {
                padding: 25px;
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <a href="home.html" class="back-btn">
            ← العودة للرئيسية
        </a>

        <div class="title">
            <h1>تواصل معنا</h1>
            <p>يسعدنا التواصل معكم والإجابة على جميع استفساراتكم</p>
        </div>

        <div class="contact-box">

            <div class="info">
                <h3>📞 رقم الهاتف</h3>
                <p>777704444</p>

                <h3>📧 البريد الإلكتروني</h3>
                <p>artflowers@gmail.com</p>
            </div>

            <form>
                <input type="text" placeholder="الاسم الكامل" required>

                <input type="email" placeholder="البريد الإلكتروني" required>

                <textarea placeholder="اكتب رسالتك هنا..." required></textarea>

                <button type="submit">
                    إرسال الرسالة
                </button>
            </form>

            <div class="footer-text">
                🌷 شكراً لثقتكم بـ Art & Flowers 🌷
            </div>

        </div>
    </div>
</body>

</html>
